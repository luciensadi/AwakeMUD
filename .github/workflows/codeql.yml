# For most projects, this workflow file will not need changing; you simply need
# to commit it to your repository.
#
# You may wish to alter this file to override the set of languages analyzed,
# or to provide custom queries or build logic.
#
# ******** NOTE ********
# We have attempted to detect the languages in your repository. Please check
# the `language` matrix defined below to confirm you have the correct set of
# supported CodeQL languages.
#
name: "CodeQL"

on:
  push:
    branches: [ "master", "base" ]
  pull_request:
    branches: [ "master", "base" ]
  schedule:
    - cron: '19 4 * * 5'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    timeout-minutes: ${{ (matrix.language == 'swift' && 120) || 360 }}
    permissions:
      # required for all workflows
      security-events: write

      # required to fetch internal or private CodeQL packs
      packages: read

      # only required for workflows in private repositories
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: c-cpp
          build-mode: manual

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. Cache the apt archives. 
    # This will use the current branch's cache, or fall back to master's cache automatically.
    - name: Cache APT packages
      if: matrix.build-mode == 'manual'
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        # Hash the workflow file so the cache bursts if you add new dependencies to this file
        key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/codeql.yml') }}
        restore-keys: |
          ${{ runner.os }}-apt-

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    - if: matrix.build-mode == 'manual'
      name: Build Code
      run: |
        # 2. Prevent GitHub's Ubuntu runner from auto-deleting downloaded apt packages
        sudo rm -f /etc/apt/apt.conf.d/docker-clean
        
        sudo apt-get update
        sudo apt-get install -y libboost-filesystem-dev libcurl4-openssl-dev libnsl-dev
        
        cd src
        echo 'const char *mysql_host =     "host"; \
          const char *mysql_password = "pass";       \
          const char *mysql_user =     "user";       \
          const char *mysql_db =       "db";       ' \
          > mysql_config.cpp
          
        # 3. The biggest speedup: use all available CPU cores for the build
        make -j$(nproc)

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"